<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustSight</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Header -->
    <div class="mb-header">
        <img src="/assets/icons/icon.png" style="width: 24px; height: 24px; border-radius: 4px;" alt="logo" />
        <span class="mb-logo-text">TrustSight</span>
        <div style="flex-grow: 1;"></div>
        <svg id="open-settings" class="mb-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </div>

    <!-- Status Banner -->
    <div class="mb-status-banner status-safe" id="status-banner">
        <div class="mb-status-icon">
            <svg id="status-main-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="mb-status-text">
            <div class="mb-status-title" id="status-title">Protection is ON</div>
            <div class="mb-status-desc" id="status-desc">Loading...</div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="mb-stats-bar">
        <div class="mb-stat"><span class="mb-stat-num" id="stat-blocked">0</span><span class="mb-stat-label">Blocked</span></div>
        <div class="mb-stat-divider"></div>
        <div class="mb-stat"><span class="mb-stat-num" id="stat-ads">0</span><span class="mb-stat-label">Ads</span></div>
        <div class="mb-stat-divider"></div>
        <div class="mb-stat"><span class="mb-stat-num" id="stat-trackers">0</span><span class="mb-stat-label">Trackers</span></div>
    </div>

    <!-- Per-Site Toggles -->
    <div class="mb-section-label">PROTECTION FOR <span id="current-domain">THIS SITE</span></div>

    <div class="mb-toggles">
        <div class="mb-toggle-row">
            <div class="mb-toggle-left">
                <div class="mb-toggle-icon malware"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
                <span class="mb-toggle-label">Malware Protection</span>
            </div>
            <label class="mb-switch"><input type="checkbox" id="toggle-malware" checked><span class="mb-slider"></span></label>
        </div>
        <div class="mb-toggle-row">
            <div class="mb-toggle-left">
                <div class="mb-toggle-icon scam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div>
                <span class="mb-toggle-label">Scam Protection</span>
            </div>
            <label class="mb-switch"><input type="checkbox" id="toggle-scam" checked><span class="mb-slider"></span></label>
        </div>
        <div class="mb-toggle-row">
            <div class="mb-toggle-left">
                <div class="mb-toggle-icon ads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg></div>
                <span class="mb-toggle-label">Ads / Trackers</span>
            </div>
            <label class="mb-switch"><input type="checkbox" id="toggle-ads" checked><span class="mb-slider"></span></label>
        </div>
        <div class="mb-toggle-row">
            <div class="mb-toggle-left">
                <div class="mb-toggle-icon pup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg></div>
                <span class="mb-toggle-label">PUPs</span>
            </div>
            <label class="mb-switch"><input type="checkbox" id="toggle-pup" checked><span class="mb-slider"></span></label>
        </div>
    </div>

    <!-- Bottom -->
    <div class="mb-bottom">
        <div class="mb-bottom-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            <span id="ext-monitor-desc">Extension Monitor</span>
            <span class="mb-badge safe">Safe</span>
        </div>
        <div class="mb-bottom-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span>Breach Alert</span>
            <span class="mb-badge safe">Safe</span>
        </div>
    </div>

    <div class="mb-footer">
        <span>TrustSight v1.0</span>
        <span>·</span>
        <span class="mb-footer-link" id="open-dashboard">Support</span>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
