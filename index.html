<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustSight Browser Guard</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0b0f19; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; max-width: 800px; padding: 2rem; z-index: 2; }
        h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem; color: #4fc3f7; }
        p { font-size: 1.2rem; color: #a0aec0; margin-bottom: 2rem; line-height: 1.6; }
        .shield-icon { width: 100px; height: 100px; color: #4fc3f7; margin-bottom: 1rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(79, 195, 247, 0.5)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(79, 195, 247, 0.8)); } 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(79, 195, 247, 0.5)); } }
        .btn { background: #4fc3f7; color: #0b0f19; padding: 1rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn:hover { background: #29b6f6; }
        .badge { display: inline-block; background: rgba(79, 195, 247, 0.1); border: 1px solid rgba(79, 195, 247, 0.3); color: #4fc3f7; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/icons/icon.png" class="shield-icon" style="width: 100px; height: 100px; border-radius: 16px; margin-bottom: 1rem;" alt="logo" />
        <br>
        <span class="badge">NEXTGEN HACKATHON ENTRY</span>
        <h1>TrustSight Browser Guard</h1>
        <p>A sophisticated Chrome Extension engineered to preemptively block malware, scams, intrusive trackers, and potentially unwanted programs directly at the edge.</p>
        <a href="https://github.com/adarshlilhare/TrustSight" class="btn" target="_blank" rel="noopener">
            View on GitHub
        </a>
    </div>
</body>
</html>
